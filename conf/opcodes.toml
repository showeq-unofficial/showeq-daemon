[[zone]]
id      = "306c"
name    = "OP_BuffQuery"
updated = "2026-05-13"
comment = "C>S: {u32 buff_slot, u32 self_spawn_id} (8 bytes). Client requests server reconfirm buff slot N at zone-in. Fires once per occupied buff slot on the SECOND zone-in after a buff was applied (not the first — the buff must survive one full zone cycle before the client requests verification). Server responds with OP_Buff for that slot. Wire-verified: slot=0 → OP_Buff IVU(225) spellslot=0; slot=1 → DE(352) spellslot=1; slot=2/1/0 → SLW/SoW/Regen."

  [[zone.payloads]]
  dir           = "client"
  typename      = "uint8_t"
  sizechecktype = "none"

[[zone]]
id      = "bbf0"
name    = "OP_BuffWindow"
updated = "2026-05-13"
comment = "S>C: fires 10x per zone-in (slots 0-9), one packet per slot. Payload: {u32 slot, u32 spellid=0xffffffff_empty, u32 pad} (12 bytes). Initializes the short-duration buff window at zone-in. Field2 always 0xffffffff in all observed captures — active buffs come via OP_Buff/OP_BuffQuery instead. Never fires mid-session. Wire-verified across 4 captures (100 total fires)."

  [[zone.payloads]]
  dir           = "server"
  typename      = "buffWindowSlotStruct"
  sizechecktype = "match"

[[zone]]
id      = "5855"
name    = "OP_SpawnAppearance2"
updated = "2026-05-12"
comment = "Extended 24-byte bidirectional appearance update. Payload: {u32 spawn_id, u32 type, u32 value, u8[12] pad}. C>S type=0x24 (36) with spawn_id=0 = OP_ClickBuffOff (buff_slot in value field). S>C fires carry guild/cast/appearance types and co-occur with buff landing messages. Distinct from OP_SpawnAppearance (0xca91, 8 bytes)."

  [[zone.payloads]]
  dir           = "both"
  typename      = "uint8_t"
  sizechecktype = "none"

