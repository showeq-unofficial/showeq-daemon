comment = "EQ Legends equip-change broadcast (32B), decoded but wired INERT (l-patch addendum 3). Layout: {u32 spawnId, u32 wearSlot (7=primary/8=secondary/9), u32 material, u8[20] 0}. S>C = other spawns' equip changes; C>S = the client's own. Stock ShowEQ's WearChange handler only acts on an HP subcommand (shows nothing for wear), so this is NAMED-but-INERT: NO handler is wired. The Live SpawnUpdateStruct/updateSpawnInfo bindings (still in wire_live.cpp) were REMOVED from wire_eql.cpp because sizeof(SpawnUpdateStruct)==32==this packet's size, so binding them would SZC_Match and mis-decode wear bytes as a spawn update (spawn-state corruption). Each wear event is preceded by a 0x2575/0x2a0a appearance-refresh pair (value 0x40=wear, 0x04=combat/death); own changes are echoed by 0x7820 (~1.1KB item). Live equipment tracking would build on this layout. Named per addendum 3 so it stops showing as unknown in --opcode-stats. See OPCODES_LEGENDS.md."

  [[zone.payloads]]
  dir           = "both"
  typename      = "uint8_t"
  sizechecktype = "none"

