[[zone]]
id      = "6c3c"
name    = "OP_Buff"
priority = 6
priority_note = "client dir = memorize/forget, consumed silently"
updated = "2026-07-19"
comment = "S>C, two shapes ride this id. (a) 24B COMPACT record {u32 field0@0, u32 spellId@4, u32=1@8, u32 changeType@12, 0, 0}, changeType 4/1. DECODED BUT DELIBERATELY NOT APPLIED — it is probably NOT buff state. In one fixture it carries {1, 665, 4} for \"Drifting Death\" while that capture's chat reads \"a greater kobold has taken 196 damage from your Drifting Death\", i.e. a DoT cast ON A MOB, which cannot sit in the player's buff window; another record is {8, 3579} \"Share Form of the Great Wolf\", also player-cast. So field0 looks like the spell GEM slot cast from, not a buff slot, and values >=15 (15, 331..339 seen) are something else again. Applying it would show spells cast on others as buffs on the player, and treating changeType 1 as a fade would delete a real buff of the same spell id. Legacy showeq buffChange does apply it (unconditional player attribution, add on 4 / delete on 1) and carries that flaw. TO IDENTIFY: cast a known spell from a known gem and see whether field0 tracks the gem, and whether a buff received FROM someone else ever appears here. OP_BuffList/2/3 remain the authoritative buff source. (b) older variable-length forms: 13b fade {u32 spawnID, u32 spellID, u16=0x0001, u8=0, u8 slot, u8=0}; 30b self-buff add; 34/51/53/59b embedded blocks; 85b 3-block. Pre-patch OP_Buff 0x55b9 no longer fires."

  [[zone.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

