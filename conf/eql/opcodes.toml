[[world]]
id      = "0935"
name    = "OP_EnterWorld"
updated = "2026-07-16"
comment = "Client tells world server to enter world with selected char. EQ Legends: 72b C>S, char name (zero-padded) at offset 0. Re-found 2026-07-16 after the 07/14 rotation left it unmapped (ffff): dump-payload of a 12-zone capture gave 0x0935 = 11×72B C>S (one per same-socket zone re-entry) + 11×5B S>C ack, and all 11 carry the SAME constant char-name @0 (NUL-term) — clinched. NOTE the trailer is no longer 0xffffffff (now a small value ~0x0b), so no struct is cast; the handler only needs the trigger. Prior ids 9bdc/26bf were stale pre-rotation guesses (never on the current wire). Mapping this makes NamePromoter fire on eql (matches by opcode name + 72b len), naming the box at the WORLD handshake — earlier than the own-spawn adoption fallback."

  # C>S 72B enter-world (login + every in-place session re-entry). Bound so
  # EqlDispatch::enterWorld can reset the box + re-snapshot on a private-instance
  # / same-socket zone re-entry (no struct — payload is only a trigger).
  [[world.payloads]]
  dir           = "client"
  typename      = "uint8_t"
  sizechecktype = "none"

  # S>C 1B ack (the server reuses the opcode for it). Declared with no handler
  # so the ack matches a payload instead of logging "(dataLen: 1) doesn't match".
  [[world.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

