comment = "Client tells world server to enter world with selected char. EQ Legends: 72b C>S, BYTE-IDENTICAL to Live's layout — char name (zero-padded) at offset 0 + 64b zeros + 0xffffffff trailer; server reuses the opcode for a 1b S>C ack. Confirmed 2/2 login captures (fulllogin-20260708, login-zone-20260707) via dump-payload; name matches the known char. Mapping this id makes NamePromoter fire on eql (it matches by opcode name + 72b len), naming the box at the WORLD handshake — earlier than the own-spawn adoption fallback. Prior id 9bdc was a stale pre-2026-07-07-patch guess (never on the wire)."

