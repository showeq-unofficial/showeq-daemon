updated = "2026-05-28"
comment = "Recipient-only group event notification (modern: 168 bytes; recipient name@64, leading 64b zero, tail u32 epoch + group_id + spawn_id fields). NOT the actual roster — that's OP_GroupMemberList=0x312a. Misidentified previously based on 'fires per form-event' shape alone; content fingerprint shows only the recipient's own name with no peer identity. Kept named distinctly to avoid confusion; needs a real purpose attribution."

