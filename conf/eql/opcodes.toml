  sizechecktype = "none"

[[zone]]
id      = "ffff"
name    = "OP_GroupMemberList"
priority = -1
priority_note = "noHandler"
updated = "2026-05-28"
comment = "Modern group roster broadcast. Variable length (54-301b observed: 1-2 members at 54-107b, 6-member group at 301b). Wire layout: {u32 groupId, u32 memberCount} header, then a slot-0 leader extended record (2 null-padded name fields + u32 level/class + flags), then (memberCount-1) regular slot records each prefixed with u32 slotIdx (1, 2, …) and a null-padded name. Fires S>C at zone-in (existing roster recovery) AND on every roster mutation. Confirmed against groupbuff-repro.vpk (6-member, leader name + 5 slot markers found at 48-byte intervals starting at offset 0x42) and group-2variants.vpk (1- and 2-member cases)."

  [[zone.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

