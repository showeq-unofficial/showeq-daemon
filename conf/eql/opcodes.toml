name    = "OP_ClientUpdate"
priority = 10
updated = "2026-07-14"
comment = "07/14 rotation (was 0x7171): whole position channel rotated id AND wire size. S>C 24B (was 28B) = OTHER-spawn position broadcast, 19-bit ×8 packed in each word's LOW bits (z rides bits13-31 of the @8 word; y@16 low19; x@20 low19) — re-cracked 2026-07-14 vs the OP_MobUpdate ground-truth stream + self-trajectory smoothness; WIRED S>C (playerUpdateOther → SpawnShell::moveSpawn). C>S 38B (was 42B) self-position — re-cracked 2026-07-14 vs a /loc ground-truth capture: IEEE floats gameX@14/gameY@26/gameZ@10 + heading@18 (low 12b); NO spawnId (client's self report carries none — self-id adoption is via SpawnShell::zoneEntry name-match). WIRED C>S (playerUpdateSelf → Player::applySelfPosition). See OPCODES_LEGENDS.md"

  # C>S 38B self-position report (was 42B). Re-cracked 2026-07-14 against a /loc
  # ground-truth capture; size-gated on playerSelfPosStruct (size override = 38 =
  # PAYLOAD_LEN). Decode is Rust (parse_player_self_pos, eql's own 38B copy) →
  # EqlDispatch::playerUpdateSelf → Player::applySelfPosition (C>S is always self).
  [[zone.payloads]]
  dir           = "client"
  typename      = "playerSelfPosStruct"
  sizechecktype = "match"

  # 24B S>C other-spawn position broadcast. eql's playerSpawnPosStruct is now 24B
  # (19-bit ×8 packed, coord in each word's LOW bits) — same SIZE as Live's stock
  # struct but a DIFFERENT packing; the size (24) is declared by
  # seq-backend-eql::size_overrides (PAYLOAD_LEN), so SZC_Match validates the real
  # struct name (no uint8_t placeholder). Decode is Rust (decode_player_spawn_pos,
  # eql's own 24B copy) → EqlDispatch::playerUpdateOther → SpawnShell::moveSpawn.
  [[zone.payloads]]
  dir           = "server"
  typename      = "playerSpawnPosStruct"
  sizechecktype = "match"

