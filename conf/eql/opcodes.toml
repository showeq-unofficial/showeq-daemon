updated = "2026-07-19"
comment = "Subcode-multiplexed corpse-loot channel; the client requests a loot action and the server confirms. Subcodes (u16@0) seen in a 26min capture: 3 (C 2B / S 6B request+ack, purpose unknown), 6 (C 25B, the loot request), 5 (S 16B, layout unmapped), 7 (S 36B, the confirmation, decoded). The 36B confirmation echoes the request body and appends the proceeds: {u16 subcode=7@0, u16=1@2, u32 itemId@4, u32 slot@8, u32 corpseId@12, u32 quantity@16, u32 requestSeq@20, u16@24, u32 coinCopper@26, u8[6]=0@30}. WIRE-VERIFIED: across 24 confirmations the 18 non-zero @26 values matched exactly and in full the 18 amounts the server separately stated as English text (\"...and sold it for 3 gold, 5 silver and 7 copper\" = 357), and all 18 distinct corpseIds are spawns that both died and appear as a loot_drops corpse id. Decoded by parse_loot_transaction -> EqlDispatch::lootTransaction -> Player::adjustMoney + proto LootTransaction; this replaced parsing the sale wording out of OP_LootMessage. NOTE legacy showeq maps this id as a death/combat record (deathRecordEQLStruct {sourceId, skillOrDamage, targetId, combatSeq}) and discards it. That reading does not survive the capture: the record is client-initiated, every target was looted rather than merely killed, its trailing field is coin, and its \"always 1\" field @16 also takes the value 2. Kills are covered separately by OP_Death (0x36bf): 47 fires -> 47 spawn_killed, versus 24 of these."

