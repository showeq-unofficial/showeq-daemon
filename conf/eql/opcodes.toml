[[zone]]
id      = "7171"
name    = "OP_ClientUpdate"
updated = "2026-07-05"
comment = "EQ Legends: C>S self-position (42B, wired). A 28B S>C variant carries OTHER-PLAYER positions (own byte-aligned pos+vel layout, not MobUpdate's packing) — identified 2026-07-08, field layout partial (needs a 2nd-char walk capture to finalize), still unwired. See OPCODES_LEGENDS.md"

  # Size-gated on playerSelfPosStruct (sizeof==42): the eql self-pos FIELD layout
  # differs from Live's, but the size matches, so this is a size-gate only — the
  # actual decode is Rust (decode_player_self_pos). No struct reshape, neutral name.
  [[zone.payloads]]
  dir           = "client"
  typename      = "playerSelfPosStruct"
  sizechecktype = "match"

  # 28B S>C variant = other-player position broadcast; accept without a size
  # check so it doesn't spam "doesn't match" warnings. No handler yet
  # (layout partial — see OPCODES_LEGENDS.md 2026-07-08 reverse-direction sweep).
  [[zone.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

[[zone]]
id      = "4606"
name    = "OP_ZoneSpawns"
updated = "2026-07-08"
comment = "EQ Legends spawn info (S>C): null-term name + variable block; position = three u32 words at the block tail (Z/Y/X @ len-95/-91/-87), each a signed 19-bit fixed-point (x8) coord in the word's low bits — same packing as Live spawnStruct position words. See OPCODES_LEGENDS.md"

  [[zone.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

  # A single C>S 92B also fires once per zone-in = client zone-entry / spawn-list
  # request (session token@0 + null-term char name@4 + fixed signature block).
  # Acknowledge it so it doesn't warn. No handler yet — see OPCODES_LEGENDS.md.
  [[zone.payloads]]
  dir           = "client"
  typename      = "uint8_t"
  sizechecktype = "none"

[[zone]]
id      = "7352"
name    = "OP_NpcMoveUpdate"
updated = "2026-07-08"
comment = "EQ Legends per-NPC movement stream (S>C, variable 15-21B). Byte-identical bit format to Live OP_NpcMoveUpdate (16b BE spawnId + 16b pad + 6b fieldmask + 19/19/19 y/x/z sign-magnitude >>3 + 12b heading + optional deltas); decoded by the shared decode_npc_move_update. Confirmed 2026-07-08: all 51 ids + positions match the 0x67e0 OP_MobUpdate stream. Prior 917c was a dead mapping (never seen on the wire). See OPCODES_LEGENDS.md."

  [[zone.payloads]]
  dir           = "server"
  typename      = "uint8_t"
  sizechecktype = "none"

[[zone]]
id      = "67e0"
name    = "OP_MobUpdate"
updated = "2026-07-08"
comment = "EQ Legends per-mob position update (S>C, 14B). Byte-identical to Live spawnPositionUpdate (packed y:19/z:19/u3:7/x:19/heading:12 fixed-point x8, spawnId u16@0 + 2 zero bytes); decoded by the shared decode_mob_update. The earlier i16-offset read (Y@4/8, Z@6/64, X@10) was a truncated window of these bitfields — the source of the 8192-unit north<->south Y wrap. See OPCODES_LEGENDS.md."

  # Byte-identical to Live spawnPositionUpdate (sizeof==14) → size-gate on it
  # directly; decode via the shared Rust decode_mob_update.
  [[zone.payloads]]
  dir           = "server"
  typename      = "spawnPositionUpdate"
  sizechecktype = "match"

[[zone]]
id      = "59a1"
name    = "OP_DeleteSpawn"
updated = "2026-07-08"
comment = "EQ Legends spawn removal / death (S>C, 4B {u32 spawnId}, deleteSpawnStruct). CONFIRMED 2026-07-08 by time-correlation: 8/9 ids stop receiving OP_MobUpdate position updates at/after this event (mobs killed over a combat session). Lights up the already-wired SpawnShell::deleteSpawn. NOTE: 0x67a8 is the LOOK-ALIKE 4B {id} op but is combat engage/disengage (ids keep moving after; id=0 clears) — NOT despawn. See OPCODES_LEGENDS.md"

  [[zone.payloads]]
  dir           = "both"
  typename      = "deleteSpawnStruct"
  sizechecktype = "match"

