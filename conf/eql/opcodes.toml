[[zone]]
id      = "ffff"
name    = "OP_BuffQuery"
updated = "2026-05-13"
comment = "C>S: {u32 buff_slot, u32 self_spawn_id} (8 bytes). Client requests server reconfirm buff slot N at zone-in. Fires once per occupied buff slot on the SECOND zone-in after a buff was applied (not the first — the buff must survive one full zone cycle before the client requests verification). Server responds with OP_Buff for that slot. Wire-verified: slot=0 → OP_Buff IVU(225) spellslot=0; slot=1 → DE(352) spellslot=1; slot=2/1/0 → SLW/SoW/Regen."

  [[zone.payloads]]
  dir           = "client"
  typename      = "uint8_t"
  sizechecktype = "none"

[[zone]]
id      = "18e0"
name    = "OP_BuffWindow"
updated = "2026-07-08"
comment = "EQ Legends buff-window init (S>C, 12B = buffWindowSlotStruct, fires 10x/zone-in for slots 0-9). CONFIRMED 2026-07-08: 10 fires, slot u32@0 = 0..9, spellid u32@4 = 0xffffffff (empty), pad u32@8 = 0 — byte-identical to Live. NOTE: no OP_BuffWindow handler is wired on eql yet (id-only; resolves in opcode-stats but not surfaced). Layout: {u32 slot, u32 spellid=0xffffffff_empty, u32 pad}; long-duration buffs come via OP_Buff / the buff-bar sync; never fires mid-session."

  [[zone.payloads]]
  dir           = "server"
  typename      = "buffWindowSlotStruct"
  sizechecktype = "match"

[[zone]]
id      = "ffff"
name    = "OP_SpawnAppearance2"
updated = "2026-05-27"
comment = "Extended 24-byte bidirectional appearance update. Payload: {u32 spawn_id, u32 type, u32 value, u8[12] pad}. C>S type=0x24 (36) with spawn_id=0 = OP_ClickBuffOff (buff_slot in value field). S>C fires carry guild/cast/appearance types and co-occur with buff landing messages. Distinct from OP_SpawnAppearance. Re-confirmed post-2026-05-22 patch: type set {5,6,8,22,26,36,42} matches; ClickBuffOff C>S type=0x24 fires with spawn_id=0, varying buff_slot. type=0x2c (44) S>C = TLP-ruleset mob-lock / FTE attackable flag: value=0 = attackable (fires ~5-7s after a fresh spawn's OP_ZoneEntry — the grey→attackable transition), value=1 = locked/engaged (fires when a mob is claimed; observed firing for the engaged target exactly at engage time). Per-spawn 0/1 toggle, balanced across a session; absent on standard Live (mobs always attackable). Confirmed 2026-05-27 on a locked TLP server (moblock.vpk): fresh spawns 14245/14247/14264 each spawn→value=0 after ~5-7s; engaged target 13799 → value=1 at engage. Wired to Spawn.locked → web UI."

  [[zone.payloads]]
  dir           = "both"
  typename      = "uint8_t"
  sizechecktype = "none"

