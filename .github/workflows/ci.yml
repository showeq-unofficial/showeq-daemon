name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, fedora]
        include:
          - os: fedora
            container: fedora:latest
    name: build-${{ matrix.os }}
    steps:
      - name: prepare container (Fedora)
        if: matrix.os == 'fedora'
        run: dnf install -y --setopt=install_weak_deps=False git tar findutils

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: checkout showeq-decoder-rs (Corrosion hard-dep)
        uses: actions/checkout@v5
        with:
          repository: showeq-unofficial/showeq-decoder-rs
          path: showeq-decoder-rs

      - name: install build deps (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            qt6-base-dev qt6-websockets-dev qt6-5compat-dev \
            libpcap-dev libprotobuf-dev protobuf-compiler zlib1g-dev

      - name: install build deps (Fedora)
        if: matrix.os == 'fedora'
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make cmake pkgconf-pkg-config cargo \
            qt6-qtbase-devel qt6-qtwebsockets-devel \
            libpcap-devel protobuf-devel protobuf-compiler zlib-devel

      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSEQ_DECODER_RS_DIR=$GITHUB_WORKSPACE/showeq-decoder-rs

      - name: build
        run: cmake --build build -j

      - name: test
        working-directory: build
        run: ctest --output-on-failure

      - name: smoke
        run: |
          # ctest is unit tests; it doesn't actually launch the daemon.
          # Synthesize a minimal spells_us.txt + eqstr_us.txt + empty
          # .vpk and run a real --replay end-to-end. Catches startup
          # crashes that unit tests can't see — e.g. the trailing-NUL
          # bug in the text loaders that ate the Qt6 build's first
          # live run before f256926.
          printf '1^Test%s\n' "$(printf '^0%.0s' {1..60})" > conf/spells_us.txt
          printf '1\n0\n' > conf/eqstr_us.txt
          touch /tmp/empty.vpk
          ./build/showeq-daemon --replay /tmp/empty.vpk --no-listen --config-dir conf --strict-gate-sizes

  # The `build` job above builds the default target (live, SEQ_TARGET unset).
  # This job configures + builds the OTHER backends so a break in the test/eql
  # wiring, struct registry, or conf/<target>/opcodes.toml is caught in CI. Kept
  # to one os/qt combo — backend selection is compiler/platform-agnostic, so the
  # full matrix would only re-test what the live job already covers.
  build-targets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        seq_target: [test, eql]
    name: build-${{ matrix.seq_target }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: checkout showeq-decoder-rs (Corrosion hard-dep)
        uses: actions/checkout@v5
        with:
          repository: showeq-unofficial/showeq-decoder-rs
          path: showeq-decoder-rs

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            qt6-base-dev qt6-websockets-dev qt6-5compat-dev \
            libpcap-dev libprotobuf-dev protobuf-compiler zlib1g-dev

      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSEQ_TARGET=${{ matrix.seq_target }} -DSEQ_DECODER_RS_DIR=$GITHUB_WORKSPACE/showeq-decoder-rs

      - name: build
        run: cmake --build build -j

      - name: smoke
        run: |
          # conf/<target>/opcodes.toml is committed; the build generates its
          # XML. Empty-vpk replay exercises startup + per-target opcode load.
          # --strict-gate-sizes fails the job if a mapped SZC_Match opcode
          # gates on an inherited Live sizeof (eql must declare it in
          # seq-backend-eql size_overrides(); no-op on test).
          printf '1^Test%s\n' "$(printf '^0%.0s' {1..60})" > conf/spells_us.txt
          printf '1\n0\n' > conf/eqstr_us.txt
          touch /tmp/empty.vpk
          ./build/showeq-daemon --replay /tmp/empty.vpk --no-listen --config-dir conf --strict-gate-sizes
